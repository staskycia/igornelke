baseURL = "https://igornelke.pl/"
languageCode = "pl"
defaultContentLanguage = "pl"
title = "Igor Nelke"
theme = "PaperMod"
copyright = "&copy; 2026"

[params]
    defaultTheme = "dark"
    dateFormat = "02.01.2006"
    customCSS = ["css/custom.css"]
    alert = { enabled = true, text = "W środę (25 lutego) odbędzie się pierwsza tura wyborów. Zachęcamy do głosowania poprzez linki na staszicowych mailach!" }

[params.footer]
    text = "Komitet Wyborczy Kandydata na Prezydenta Samorządu Uczniowskiego Igora Nelke"

[params.profileMode]
    enabled = true
    title = "Igor Nelke"
    subtitle = "Kandydat na Prezydenta Samorządu Uczniowskiego"
    imageUrl = "/images/igor-start.png"
    imageTitle = "Igor Nelke"
    imageWidth = 200
    imageHeight = 200

[[params.socialIcons]]
    name = "email"
    url = "mailto:komitet@igornelke.pl"

[[params.socialIcons]]
    name = "instagram"
    url = "https://www.instagram.com/igornelke.wybory"

[[params.socialIcons]]
    name = "facebook"
    url = "https://www.facebook.com/profile.php?id=100086393505714"

[menus]
    [[menus.main]]
        name = "Start"
        pageRef = "/"
        weight = 10
    [[menus.main]]
        name = "Dotychczasowa działalność"
        pageRef = "/dzialalnosc"
        weight = 20
    [[menus.main]]
        name = "Komitet"
        pageRef = "/komitet"
        weight = 30
    [[menus.main]]
        name = "Program"
        pageRef = "/program"
        weight = 40